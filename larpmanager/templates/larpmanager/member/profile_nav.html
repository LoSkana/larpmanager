{% load i18n %}
{% if association %}
    <div class="nav">
        {% for item in profile_nav_items %}
            <a {% if item.active %}class="sel"{% endif %} href="{{ item.url }}">
                <i class="{{ item.icon }}"></i> <span class="nav-label">{{ item.label }}</span>
            </a>
        {% endfor %}
    </div>
{% endif %}
