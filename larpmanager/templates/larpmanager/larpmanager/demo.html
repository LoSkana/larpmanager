{% extends "base.html" %}
{% load i18n static %}
{% block title %}
    {{ texts.demo_page_title }}
{% endblock title %}
{% block content %}
    {{ texts.demo_content | safe }}
    <form action="{{ request.path }}"
          method="post"
          enctype="multipart/form-data">
        {% csrf_token %}
        <table class="mob ">
            {{ form.as_table }}
        </table>
        <input type="submit" id="id_submit" value="{% trans "Confirm" %}">
    </form>
    {{ texts.desktop_recommendation | safe }}
{% endblock content %}
