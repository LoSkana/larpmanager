{% load i18n static %}
<script>
var $sel = $('#id_wwyltd');
    if (!$sel.length) return;

    {% if run %}
    var choicesUrl = '{% url "wwyltd_choices_ajax" run.get_slug %}';
    var ajaxUrl    = '{% url "wwyltd_ajax" run.get_slug %}';
    {% else %}
    var choicesUrl = '{% url "wwyltd_choices_ajax" %}';
    var ajaxUrl    = '{% url "wwyltd_ajax" %}';
    {% endif %}

    var choicesLoaded = false;

    $sel.select2({
        placeholder: '{% filter escapejs %}{% trans "What would you like to do?" %}{% endfilter %}',
        allowClear: false,
    });

    $sel.on('select2:opening', function(e) {
        if (choicesLoaded) return;
        e.preventDefault();
        $.getJSON(choicesUrl, function(data) {
            choicesLoaded = true;
            data.results.forEach(function(item) {
                $sel.append(new Option(item.text, item.id));
            });
            $sel.select2('open');
        });
    });

    $sel.on('change', function() {
        if (!this.value) return;

        var $form = $(this).closest('form');
        var formData = new FormData($form[0]);
        {% if run %}
        formData.append('event_slug', '{{ run.get_slug }}');
        {% endif %}

        $.ajax({
            url: ajaxUrl,
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function(response) {
                if (response.success && response.url) {
                    window.open(response.url, '_blank');
                    $sel.val(null).trigger('change');
                } else {
                    console.error('Invalid response:', response);
                    if (!window.lmTesting) alert('{% filter escapejs %}{% trans "An error occurred" %}{% endfilter %}');
                }
            },
            error: function(xhr) {
                var msg = '{% filter escapejs %}{% trans "An error occurred" %}{% endfilter %}';
                try {
                    var r = JSON.parse(xhr.responseText);
                    if (r.error) msg = r.error;
                } catch(e) {}
                console.error('AJAX error:', xhr);
                if (!window.lmTesting) alert(msg);
            },
        });
    });
</script>
