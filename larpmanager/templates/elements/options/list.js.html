{% load i18n static %}
<script>
window.addEventListener('DOMContentLoaded', function() {

    $(document).ready(function() {
        // Get question UUID from the iframe's context
        const questionUuid = '{{ el.uuid }}';

        // Handle "New Option" button click - send message to parent if in iframe
        $('.new-option').on('click', function(e) {
            if (window.parent && window.parent !== window) {
                e.preventDefault();
                window.parent.postMessage({
                    type: 'open_option_modal',
                    optionUuid: '',
                    questionUuid: questionUuid
                }, '*');
                return false;
            }
            // standalone: allow default href navigation
        });

        // Handle "Edit Option" link click - send message to parent if in iframe
        $(document).on('click', '.edit-option-ajax', function(e) {
            if (window.parent && window.parent !== window) {
                e.preventDefault();
                const optionUuid = $(this).data('option-uuid');
                window.parent.postMessage({
                    type: 'open_option_modal',
                    optionUuid: optionUuid,
                    questionUuid: questionUuid
                }, '*');
                return false;
            }
            // standalone: allow default href navigation
        });

        // Handle ordering links (arrow up/down) - AJAX request then reload iframe
        $(document).on('click', 'a[href*="/options/"][href*="/order/"]', function(e) {
            e.preventDefault();
            const orderUrl = $(this).attr('href');

            $.ajax({
                url: orderUrl,
                method: 'GET',
                success: function() {
                    // Reload the iframe by reloading itself
                    window.location.reload();
                    // Height will be updated after reload via setTimeout
                },
                error: function() {
                    if (!window.lmTesting) alert('{% filter escapejs %}{% trans "An error occurred while reordering" %}{% endfilter %}');
                }
            });

            return false;
        });

        // Handle delete links - AJAX request with confirmation then reload iframe
        $(document).on('click', '.delete-option-ajax', function(e) {
            e.preventDefault();

            const deleteUrl = $(this).attr('href');

            $.ajax({
                url: deleteUrl,
                method: 'GET',
                success: function() {
                    // Reload the iframe by reloading itself
                    window.location.reload();
                    // Height will be updated after reload via setTimeout
                },
                error: function() {
                    if (!window.lmTesting) alert('{% filter escapejs %}{% trans "An error occurred while deleting" %}{% endfilter %}');
                }
            });

            return false;
        });
    });

});
</script>
